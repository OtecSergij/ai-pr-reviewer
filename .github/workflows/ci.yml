name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/otecsergij/ai-pr-reviewer

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx next typegen
      - run: npm run lint
      - run: npx tsc --noEmit
      - name: Assert startup preload is wired into the entrypoint
        run: grep -q 'validate-startup.mjs' Dockerfile

  build-push:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build image (load for smoke test)
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:ci
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test - container fails fast on missing env
        run: |
          if docker run --rm ${{ env.IMAGE }}:ci; then
            echo "ERROR: container should exit non-zero with no env"
            exit 1
          fi
          echo "fail-fast OK"
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        if: github.ref == 'refs/heads/main'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger Coolify deploy
        env:
          COOLIFY_DEPLOY_URL: ${{ secrets.COOLIFY_DEPLOY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_DEPLOY_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "Coolify secrets not set - skipping deploy (configure in Coolify, Phase C)"
            exit 0
          fi
          curl --fail-with-body --retry 3 --retry-connrefused --retry-delay 5 \
            --connect-timeout 10 --max-time 60 -sS \
            "$COOLIFY_DEPLOY_URL" --header "Authorization: Bearer $COOLIFY_TOKEN"
